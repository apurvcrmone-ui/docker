<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f6feb" />
      <stop offset="100%" stop-color="#58a6ff" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Step 1: Dockerfile -->
  <g transform="translate(30, 30)" filter="url(#dropShadow)">
    <rect width="120" height="90" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="60" y="35" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="bold">Dockerfile</text>
    <text x="60" y="55" text-anchor="middle" fill="#8b949e" font-size="9">Instructions</text>
    <rect x="20" y="65" width="80" height="15" rx="3" fill="#21262d" stroke="#30363d" stroke-width="1" />
    <text x="60" y="76" text-anchor="middle" fill="#58a6ff" font-size="8" font-family="Courier New, monospace">FROM alpine</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(160, 65)">
    <path d="M 5 10 L 45 10" fill="none" stroke="#8b949e" stroke-width="2" />
    <polygon points="45,6 53,10 45,14" fill="#8b949e" />
    <text x="25" y="-2" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="bold">docker build</text>
  </g>

  <!-- Step 2: Image -->
  <g transform="translate(220, 30)" filter="url(#dropShadow)">
    <rect width="120" height="90" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5" />
    <text x="60" y="35" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="bold">Docker Image</text>
    <text x="60" y="55" text-anchor="middle" fill="#8b949e" font-size="9">Blueprint / Template</text>
    <rect x="20" y="65" width="80" height="15" rx="3" fill="#21262d" stroke="#d29922" stroke-width="1" />
    <text x="60" y="75" text-anchor="middle" fill="#f8e3a1" font-size="8">nginx:latest</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(350, 65)">
    <path d="M 5 10 L 45 10" fill="none" stroke="#8b949e" stroke-width="2" />
    <polygon points="45,6 53,10 45,14" fill="#8b949e" />
    <text x="25" y="-2" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="bold">docker run</text>
  </g>

  <!-- Step 3: Container -->
  <g transform="translate(410, 30)" filter="url(#dropShadow)">
    <rect width="150" height="90" rx="8" fill="url(#blueGrad)" stroke="#1f6feb" stroke-width="1.5" />
    <text x="75" y="35" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Docker Container</text>
    <text x="75" y="55" text-anchor="middle" fill="#f0f6fc" font-size="9">Active Instance</text>
    <rect x="20" y="65" width="110" height="15" rx="3" fill="#0d1117" />
    <text x="75" y="75" text-anchor="middle" fill="#58a6ff" font-size="8">Status: Running</text>
  </g>
</svg>
