<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
  <!-- Gradients -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f6feb" />
      <stop offset="100%" stop-color="#58a6ff" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#da3633" />
      <stop offset="100%" stop-color="#f85149" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#238636" />
      <stop offset="100%" stop-color="#56d364" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#21262d" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Title: Shift to Containers -->
  <text x="400" y="35" text-anchor="middle" fill="#f0f6fc" font-size="20" font-weight="bold">Traditional vs. Docker Deployment</text>

  <!-- LEFT: Traditional Deployment -->
  <g transform="translate(40, 60)" filter="url(#dropShadow)">
    <!-- Main Card -->
    <rect width="330" height="250" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1.5" />
    <text x="20" y="35" fill="#8b949e" font-size="14" font-weight="bold" letter-spacing="1">TRADITIONAL DEPLOYMENT</text>
    
    <!-- Developer Machine -->
    <rect x="20" y="60" width="120" height="90" rx="8" fill="#21262d" stroke="#f85149" stroke-width="1" />
    <text x="80" y="85" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="bold">Dev Machine</text>
    <text x="80" y="110" text-anchor="middle" fill="#8b949e" font-size="10">Python 3.9</text>
    <text x="80" y="125" text-anchor="middle" fill="#8b949e" font-size="10">Django 4.0</text>

    <!-- Arrow -->
    <path d="M 155 105 L 195 105" fill="none" stroke="#8b949e" stroke-width="2" stroke-dasharray="4,4" />
    <!-- Custom Arrow Head -->
    <polygon points="195,101 203,105 195,109" fill="#8b949e" />

    <!-- Production Machine -->
    <rect x="190" y="60" width="120" height="90" rx="8" fill="#21262d" stroke="#f85149" stroke-width="1" />
    <text x="250" y="85" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="bold">Prod Machine</text>
    <text x="250" y="110" text-anchor="middle" fill="#8b949e" font-size="10">Python 3.8</text>
    <text x="250" y="125" text-anchor="middle" fill="#8b949e" font-size="10">Missing Libs</text>

    <!-- Error Banner -->
    <rect x="20" y="180" width="290" height="50" rx="6" fill="#da3633" fill-opacity="0.15" stroke="#da3633" stroke-width="1" />
    <circle cx="45" cy="205" r="12" fill="url(#redGrad)" />
    <text x="45" y="209" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">✗</text>
    <text x="70" y="202" fill="#f85149" font-size="12" font-weight="bold">Deployment Fails</text>
    <text x="70" y="218" fill="#8b949e" font-size="10">Environment & Version Mismatch</text>
  </g>

  <!-- RIGHT: Docker Deployment -->
  <g transform="translate(430, 60)" filter="url(#dropShadow)">
    <!-- Main Card -->
    <rect width="330" height="250" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1.5" />
    <text x="20" y="35" fill="#58a6ff" font-size="14" font-weight="bold" letter-spacing="1">DOCKER CONTAINERIZATION</text>
    
    <!-- Dev Container -->
    <rect x="20" y="60" width="120" height="90" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="1.5" />
    <text x="80" y="80" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="bold">Docker Image</text>
    <!-- Container graphical representation -->
    <rect x="40" y="95" width="80" height="40" rx="4" fill="url(#blueGrad)" />
    <text x="80" y="112" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">App Container</text>
    <text x="80" y="125" text-anchor="middle" fill="#ffffff" font-size="8">Python 3.9 + Libs</text>

    <!-- Arrow -->
    <path d="M 155 105 L 195 105" fill="none" stroke="#58a6ff" stroke-width="2" />
    <polygon points="195,101 203,105 195,109" fill="#58a6ff" />

    <!-- Production Machine -->
    <rect x="190" y="60" width="120" height="90" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1" />
    <text x="250" y="80" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="bold">Any Server/OS</text>
    <!-- Running Container -->
    <rect x="210" y="95" width="80" height="40" rx="4" fill="url(#blueGrad)" />
    <text x="250" y="112" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">App Container</text>
    <text x="250" y="125" text-anchor="middle" fill="#ffffff" font-size="8">Python 3.9 + Libs</text>

    <!-- Success Banner -->
    <rect x="20" y="180" width="290" height="50" rx="6" fill="#238636" fill-opacity="0.15" stroke="#238636" stroke-width="1" />
    <circle cx="45" cy="205" r="12" fill="url(#greenGrad)" />
    <text x="45" y="209" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">✓</text>
    <text x="70" y="202" fill="#56d364" font-size="12" font-weight="bold">Runs Successfully</text>
    <text x="70" y="218" fill="#8b949e" font-size="10">Packaged dependencies run identically</text>
  </g>
</svg>
